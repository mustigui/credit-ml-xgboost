# Paths are relative to project root unless absolute.
paths:
  data_dir: data
  reference_stats_path: artifacts/reference_stats.json
  inference_output_dir: artifacts/inference
  drift_report_dir: artifacts/drift
  explainability_dir: artifacts/explain

mlflow:
  experiment_name: xgb_classification
  registered_model_name: xgb_classifier
  # Overridden by MLFLOW_TRACKING_URI env (e.g. http://mlflow:5000 in Docker)
  tracking_uri: file:./mlruns

data:
  # OpenML classification dataset (no Kaggle key). Swap for a local CSV path if needed.
  openml_name: credit-g
  openml_version: 1
  target_column: class
  test_size: 0.2
  random_state: 42

training:
  random_state: 42
  cv_folds: 3
  n_iter: 15
  param_distributions:
    n_estimators: [50, 100, 200]
    max_depth: [3, 5, 7, 9]
    learning_rate: [0.01, 0.05, 0.1, 0.2]
    subsample: [0.7, 0.85, 1.0]
    colsample_bytree: [0.7, 0.85, 1.0]
    min_child_weight: [1, 3, 5]
    gamma: [0, 0.1, 0.2]

# SHAP plots + JSON (same MLflow run, artifact path "explainability")
explainability:
  enabled: true
  max_samples: 500

drift:
  psi_bins: 10
  psi_alert_threshold: 0.25
  ks_alert_pvalue: 0.01

schedules:
  # Cron: twice yearly retrain (Jan 1 and Jul 1, 00:00 UTC)
  retrain_cron: "0 0 1 1,7 *"
  # Monthly batch inference (1st of month, 00:00 UTC)
  inference_cron: "0 0 1 * *"
  timezone: UTC
